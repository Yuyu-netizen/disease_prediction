<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>疾病预测系统</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #e8e8e8;
    }
    .container {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 24px;
      text-align: center;
      color: #fff;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 8px;
      color: #b8b8b8;
    }
    input, select {
      width: 100%;
      padding: 12px 14px;
      font-size: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      transition: border-color 0.2s, background 0.2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #4a9eff;
      background: rgba(255, 255, 255, 0.1);
    }
    input::placeholder {
      color: #6b6b6b;
    }
    .hint { font-size: 0.8rem; color: #7a7a7a; margin-top: 4px; }
    button {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #4a9eff, #3b82f6);
      color: #fff;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:hover { opacity: 0.92; }
    button:active { transform: scale(0.98); }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #result {
      margin-top: 24px;
      padding: 20px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.2);
      display: none;
    }
    #result.visible { display: block; }
    #result.has-disease { border-left: 4px solid #f87171; }
    #result.no-disease { border-left: 4px solid #4ade80; }
    .result-label { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; }
    .result-prob { font-size: 0.95rem; color: #a0a0a0; }
    .error-msg { color: #f87171; font-size: 0.9rem; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>疾病预测系统</h1>
    <form id="predictForm">
      <div class="form-group">
        <label for="Gender_discrete">性别</label>
        <select id="Gender_discrete" name="Gender_discrete" required>
          <option value="Female">Female</option>
          <option value="Male">Male</option>
        </select>
      </div>
      <div class="form-group">
        <label for="Age_continuous">年龄</label>
        <input type="number" id="Age_continuous" name="Age_continuous" step="0.1" min="0" max="120" placeholder="如 45">
        <div class="hint">单位：岁</div>
      </div>
      <div class="form-group">
        <label for="BMI_continuous">BMI 体重指数</label>
        <input type="number" id="BMI_continuous" name="BMI_continuous" step="0.1" min="10" max="60" placeholder="如 24.5">
      </div>
      <div class="form-group">
        <label for="blood_continuous">血压相关指标</label>
        <input type="number" id="blood_continuous" name="blood_continuous" step="0.1" min="0" placeholder="如 120">
      </div>
      <div class="form-group">
        <label for="exposure.RC_continuous">暴露指数 (exposure.RC_continuous)</label>
        <input type="number" id="exposure.RC_continuous" name="exposure.RC_continuous" step="0.01" min="0" placeholder="如 3.0">
      </div>
      <button type="submit" id="submitBtn">预测</button>
    </form>
    <div id="result">
      <div class="result-label" id="resultLabel"></div>
      <div class="result-prob" id="resultProb"></div>
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>
  <script>
    const form = document.getElementById('predictForm');
    const resultEl = document.getElementById('result');
    const resultLabel = document.getElementById('resultLabel');
    const resultProb = document.getElementById('resultProb');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      resultEl.classList.remove('visible', 'has-disease', 'no-disease');
      errorMsg.textContent = '';
      submitBtn.disabled = true;

      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());
      // 确保使用 exposure.RC_continuous 作为参数名
      if ('exposure_RC_continuous' in data) {
        data['exposure.RC_continuous'] = data['exposure_RC_continuous'];
        delete data['exposure_RC_continuous'];
      }

      try {
        const res = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const json = await res.json();

        if (!res.ok) {
          errorMsg.textContent = json.error || '预测失败';
          resultEl.classList.add('visible');
          return;
        }

        resultEl.classList.add('visible', json.has_disease ? 'has-disease' : 'no-disease');
        resultLabel.textContent = '预测结果：' + json.label;
        resultProb.textContent = '患病概率：' + (json.probability * 100).toFixed(2) + '%';
      } catch (err) {
        errorMsg.textContent = '网络错误：' + err.message;
        resultEl.classList.add('visible');
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
